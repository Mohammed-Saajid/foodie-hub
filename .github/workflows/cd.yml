name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Build, Verify, and Publish Container
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate compose configuration
        run: docker compose --env-file .env.docker.example config

      - name: Build app image via compose
        id: build
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Build the image
          docker compose --env-file .env.docker.example build app
          
          # 2. Extract the image ID
          image_id="$(docker inspect -f '{{.Id}}' foodie-hub-app:local-build)"
          
          if [[ -z "${image_id}" ]]; then
            echo "Error: Could not resolve image ID for foodie-hub-app:local-build" >&2
            exit 1
          fi
          
          echo "image_id=${image_id}" >> "${GITHUB_OUTPUT}"

      - name: Verify Application Starts (Smoke Test & Health Check)
        shell: bash
        run: |
                set -euo pipefail
                
                echo "Starting the application..."
                docker compose --env-file .env.docker.example up -d app
                
                echo "Polling http://localhost:8001/health for up to 30 seconds..."
                
                timeout=30
                elapsed=0
                interval=2
                
                # Loop until curl succeeds or timeout is reached
                while ! curl --fail --silent http://localhost:8001/health > /dev/null; do
                  if [[ "${elapsed}" -ge "${timeout}" ]]; then
                    echo "Error: Health check failed or timed out after ${timeout} seconds." >&2
                    echo "--- CONTAINER LOGS ---"
                    docker compose logs app
                    docker compose down
                    exit 1
                  fi
                  sleep "${interval}"
                  elapsed=$((elapsed + interval))
                done
                
                echo "Health check passed. Container is fully operational."
                
                # Tear down the test environment before proceeding to push
                docker compose down

      - name: Tag and push compose image to GHCR
        shell: bash
        run: |
          set -euo pipefail

          image_id="${{ steps.build.outputs.image_id }}"

          if [[ -z "${image_id}" ]]; then
            echo "Error: image_id variable is empty during push phase." >&2
            exit 1
          fi

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            echo "Pushing ${tag}"
            docker tag "${image_id}" "${tag}"
            docker push "${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"